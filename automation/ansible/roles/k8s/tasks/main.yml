---
- name: Install kubectl
  ansible.builtin.get_url:
    url: https://dl.k8s.io/release/v1.30.2/bin/linux/amd64/kubectl
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Install kind
  ansible.builtin.get_url:
    url: https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
    dest: /usr/local/bin/kind
    mode: "0755"

- name: Render kind cluster config
  ansible.builtin.template:
    src: kind-config.yml.j2
    dest: /tmp/kind-config.yml
    mode: "0644"

- name: Ensure kube directory exists
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.kube"
    state: directory
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: "0755"

- name: Check existing kind clusters
  become_user: "{{ target_user }}"
  ansible.builtin.command: kind get clusters
  register: kind_clusters
  changed_when: false
  failed_when: false

- name: Inspect kind control-plane container port bindings
  ansible.builtin.command: "docker inspect {{ kind_cluster_name }}-control-plane --format {{ '{{json .HostConfig.PortBindings}}' }}"
  register: kind_port_bindings
  changed_when: false
  failed_when: false
  when: kind_cluster_name in kind_clusters.stdout_lines

- name: Set fact for kind recreation requirement
  ansible.builtin.set_fact:
    recreate_kind_cluster: "{{ kind_cluster_name in kind_clusters.stdout_lines and ('30080/tcp' not in kind_port_bindings.stdout or '30081/tcp' not in kind_port_bindings.stdout) }}"

- name: Recreate kind cluster when required NodePort mappings are missing
  become_user: "{{ target_user }}"
  ansible.builtin.command: "kind delete cluster --name {{ kind_cluster_name }}"
  when: recreate_kind_cluster | bool

- name: Create kind cluster
  become_user: "{{ target_user }}"
  ansible.builtin.command: "kind create cluster --name {{ kind_cluster_name }} --config /tmp/kind-config.yml --wait 120s"
  when: kind_cluster_name not in kind_clusters.stdout_lines or recreate_kind_cluster | bool

- name: Ensure ArgoCD namespace exists
  become_user: "{{ target_user }}"
  ansible.builtin.shell: |
    kubectl create namespace {{ argocd_namespace }} --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  changed_when: false

- name: Install ArgoCD
  become_user: "{{ target_user }}"
  ansible.builtin.command: kubectl apply --server-side --force-conflicts -n {{ argocd_namespace }} -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: argocd_install
  changed_when: "'created' in argocd_install.stdout or 'configured' in argocd_install.stdout"

- name: Wait for ArgoCD server deployment rollout
  become_user: "{{ target_user }}"
  ansible.builtin.command: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=300s
  changed_when: false

- name: Render ArgoCD application manifest
  ansible.builtin.template:
    src: argocd-app.yml.j2
    dest: /tmp/argocd-app.yml
    mode: "0644"

- name: Apply ArgoCD application
  become_user: "{{ target_user }}"
  ansible.builtin.command: kubectl apply -f /tmp/argocd-app.yml
  register: app_apply
  changed_when: "'created' in app_apply.stdout or 'configured' in app_apply.stdout"
