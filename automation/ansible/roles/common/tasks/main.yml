---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - docker.io
      - python3-pip
    state: present

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add target user to docker group
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
