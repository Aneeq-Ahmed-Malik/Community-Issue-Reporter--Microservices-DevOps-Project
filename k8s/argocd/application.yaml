apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: community-issues
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Aneeq-Ahmed-Malik/Community-Issue-Reporter--Microservices-DevOps-Project
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: community-issues
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
