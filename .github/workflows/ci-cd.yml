name: CI-CD

on:
  push:
    branches:
      - main
    paths:
      - services/**
      - k8s/**
      - .github/workflows/ci-cd.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-publish-sync:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.sha }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME secret is required"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN secret is required"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth-service
        run: |
          docker build -t ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG} -t ${DOCKERHUB_USERNAME}/auth-service:latest services/auth-service
          docker push ${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG}
          docker push ${DOCKERHUB_USERNAME}/auth-service:latest

      - name: Build and push issue-service
        run: |
          docker build -t ${DOCKERHUB_USERNAME}/issue-service:${IMAGE_TAG} -t ${DOCKERHUB_USERNAME}/issue-service:latest services/issue-service
          docker push ${DOCKERHUB_USERNAME}/issue-service:${IMAGE_TAG}
          docker push ${DOCKERHUB_USERNAME}/issue-service:latest

      - name: Build and push notification-service
        run: |
          docker build -t ${DOCKERHUB_USERNAME}/notification-service:${IMAGE_TAG} -t ${DOCKERHUB_USERNAME}/notification-service:latest services/notification-service
          docker push ${DOCKERHUB_USERNAME}/notification-service:${IMAGE_TAG}
          docker push ${DOCKERHUB_USERNAME}/notification-service:latest

      - name: Update Kubernetes manifests with image tags
        run: |
          sed -i -E "s|image: .*auth-service:.*|image: docker.io/${DOCKERHUB_USERNAME}/auth-service:${IMAGE_TAG}|g" k8s/auth/deployment.yaml
          sed -i -E "s|image: .*issue-service:.*|image: docker.io/${DOCKERHUB_USERNAME}/issue-service:${IMAGE_TAG}|g" k8s/issue/deployment.yaml
          sed -i -E "s|image: .*notification-service:.*|image: docker.io/${DOCKERHUB_USERNAME}/notification-service:${IMAGE_TAG}|g" k8s/notification/deployment.yaml

      - name: Commit manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git add k8s/auth/deployment.yaml k8s/issue/deployment.yaml k8s/notification/deployment.yaml
          git commit -m "chore: update image tags to ${IMAGE_TAG} [skip ci]"
          git push
